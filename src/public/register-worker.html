<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Worker Registration — RealHands</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    :root { --green:#075E54; --green2:#128C7E; --wa:#25D366; --ink:#1a2b29; --muted:#6b7c79; --bg:#eef2f1; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--ink); }
    header { background: linear-gradient(135deg, var(--green2), var(--green)); color: #fff; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
    header img { width: 40px; height: 40px; }
    header h1 { font-size: 18px; } header .sub { font-size: 12px; opacity: .85; }
    header a { margin-left: auto; color: #fff; text-decoration: none; font-size: 13px; background: rgba(255,255,255,.18); padding: 7px 12px; border-radius: 16px; }
    .card { max-width: 480px; margin: 22px auto; background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 2px 10px rgba(0,0,0,.07); }
    .card h2 { font-size: 20px; margin-bottom: 4px; }
    .card .lead { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 6px; }
    input, select { width: 100%; padding: 12px 14px; border: 1px solid #d6dedc; border-radius: 10px; font-size: 15px; background: #fff; }
    input:focus, select:focus { outline: none; border-color: var(--green2); }
    .btn { width: 100%; margin-top: 22px; padding: 14px; background: var(--wa); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; }
    .btn:disabled { opacity: .6; }
    .ok { display: none; text-align: center; padding: 10px; }
    .ok .big { font-size: 44px; } .ok h2 { color: var(--green); margin: 8px 0; }
    .ok p { color: var(--muted); font-size: 14px; margin-bottom: 16px; }
    .ok a { display: inline-block; background: var(--wa); color: #fff; text-decoration: none; padding: 12px 20px; border-radius: 12px; font-weight: 700; }
    .err { color: #c0392b; font-size: 13px; margin-top: 10px; min-height: 16px; }
    .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
  </style>
</head>
<body>
  <header>
    <img src="/logo-mark.svg" alt="RealHands" />
    <div><h1>Worker Registration</h1><div class="sub">श्रमिक रजिस्ट्रेशन</div></div>
    <a href="index.html">← Home</a>
  </header>

  <div class="card" id="formCard">
    <h2>काम के लिए रजिस्टर करें</h2>
    <p class="lead">Register to find work. Fill the details below — it takes 1 minute.</p>
    <form id="form">
      <label>Your Name / आपका नाम *</label>
      <input id="name" required placeholder="e.g. Ramesh Kumar" />

      <label>Gender / लिंग *</label>
      <select id="gender" required>
        <option value="">— Select —</option>
        <option>Male / पुरुष</option>
        <option>Female / महिला</option>
        <option>Other / अन्य</option>
      </select>

      <label>WhatsApp Number / नंबर *</label>
      <input id="phone" required type="tel" inputmode="numeric" placeholder="10-digit mobile number" />

      <label>Your Trade / आपका काम *</label>
      <select id="trade" required>
        <option value="">— Select —</option>
        <option>🧱 Mason / राजमिस्त्री</option>
        <option>🔨 Carpenter / बढ़ई</option>
        <option>⚡ Electrician / इलेक्ट्रीशियन</option>
        <option>🔧 Plumber / प्लंबर</option>
        <option>🏗️ General Labour / लेबर</option>
        <option>🚛 Driver / ड्राइवर</option>
        <option>🎨 Painter / पेंटर</option>
        <option>🧹 Cleaner / सफाई कर्मी</option>
        <option>💂 Security Guard / गार्ड</option>
        <option>🌱 Gardener / माली</option>
        <option>🍳 Cook / Maid / रसोइया-मेड</option>
        <option>🔥 Welder / वेल्डर</option>
      </select>

      <label>Experience / अनुभव *</label>
      <select id="experience" required>
        <option value="">— Select —</option>
        <option>Less than 1 year / 1 साल से कम</option>
        <option>1–3 years / 1-3 साल</option>
        <option>3–7 years / 3-7 साल</option>
        <option>7+ years / 7+ साल</option>
      </select>

      <label>Your Area / इलाका *</label>
      <input id="area" required placeholder="e.g. Kukatpally, Hyderabad" />

      <label>Expected Wage per day / मजदूरी *</label>
      <select id="wage" required>
        <option value="">— Select —</option>
        <option>₹400–500 / day</option>
        <option>₹500–700 / day</option>
        <option>₹700–900 / day</option>
        <option>₹900–1200 / day</option>
        <option>₹1200+ / day</option>
      </select>

      <button class="btn" type="submit" id="submitBtn">Register / रजिस्टर करें</button>
      <div class="err" id="err"></div>
    </form>
  </div>

  <div class="card ok" id="okCard">
    <div class="big">✅</div>
    <h2>रजिस्ट्रेशन हो गया!</h2>
    <p>Your details are saved. Tap below to confirm on WhatsApp so we can contact you for work.</p>
    <a id="waLink" href="#" target="_blank" rel="noopener">💬 Confirm on WhatsApp</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    const WA_NUMBER = '__WA_NUMBER__';
    const form = document.getElementById('form');
    const btn = document.getElementById('submitBtn');
    const err = document.getElementById('err');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.textContent = '';
      const $ = (id) => document.getElementById(id);
      const data = {
        name: $('name').value.trim(),
        gender: $('gender').value,
        phone: $('phone').value.trim(),
        trade: $('trade').value,
        experience: $('experience').value,
        area: $('area').value.trim(),
        wage: $('wage').value,
      };
      if (data.phone.replace(/\D/g, '').length < 10) { err.textContent = 'Please enter a valid 10-digit number.'; return; }

      btn.disabled = true; btn.textContent = 'Saving…';
      const res = await saveToDatabase('workers', data);   // saves if Supabase is configured
      btn.disabled = false; btn.textContent = 'Register / रजिस्टर करें';

      // Build WhatsApp confirmation message (works whether or not DB is on)
      const msg = `Worker registration:%0A` +
        `Name: ${data.name}%0AGender: ${data.gender}%0APhone: ${data.phone}%0ATrade: ${data.trade}%0A` +
        `Experience: ${data.experience}%0AArea: ${data.area}%0AWage: ${data.wage}`;
      document.getElementById('waLink').href = `https://wa.me/${WA_NUMBER}?text=${msg}`;

      document.getElementById('formCard').style.display = 'none';
      document.getElementById('okCard').style.display = 'block';
    });
  </script>
</body>
</html>
