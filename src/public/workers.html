<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Workers — RealHands</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    :root { --green:#075E54; --green2:#128C7E; --wa:#25D366; --ink:#1a2b29; --muted:#6b7c79; --bg:#eef2f1; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--ink); }
    header { background: linear-gradient(135deg, var(--green2), var(--green)); color: #fff; padding: 14px 18px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 20; }
    header img { width: 38px; height: 38px; }
    header h1 { font-size: 17px; } header .sub { font-size: 11px; opacity: .85; }
    header a.home { margin-left: auto; color: #fff; text-decoration: none; font-size: 13px; background: rgba(255,255,255,.18); padding: 7px 12px; border-radius: 16px; }
    .searchbar { background: #fff; padding: 12px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); position: sticky; top: 66px; z-index: 15; }
    .searchbar input { width: 100%; padding: 11px 14px; border: 1px solid #d6dedc; border-radius: 10px; font-size: 15px; }
    .chips { display: flex; gap: 8px; overflow-x: auto; padding: 12px 16px; -webkit-overflow-scrolling: touch; }
    .chip { white-space: nowrap; padding: 8px 14px; border-radius: 18px; background: #fff; border: 1px solid #d6dedc; font-size: 13px; cursor: pointer; color: var(--ink); }
    .chip.active { background: var(--green); color: #fff; border-color: var(--green); }
    .wrap { max-width: 900px; margin: 0 auto; padding: 4px 16px 40px; }
    .count { color: var(--muted); font-size: 13px; margin: 6px 2px 12px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 14px; }
    .wcard { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 1px 5px rgba(0,0,0,.07); display: flex; flex-direction: column; gap: 10px; }
    .wtop { display: flex; align-items: center; gap: 12px; }
    .avatar { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg,var(--green2),var(--green)); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; flex-shrink: 0; }
    .wname { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 6px; }
    .verified { color: #1d9bf0; font-size: 14px; }
    .wtrade { color: var(--muted); font-size: 13px; }
    .stars { color: #ff9800; font-size: 13px; font-weight: 600; }
    .stars span { color: var(--muted); font-weight: 400; }
    .meta { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { background: var(--bg); border-radius: 8px; padding: 4px 10px; font-size: 12px; color: #44514f; }
    .tag.avail { background: #d4f5e0; color: #0a7a3d; font-weight: 600; }
    .tag.wage { background: #fff3d6; color: #8a6d1b; font-weight: 600; }
    .contact { margin-top: 4px; background: var(--wa); color: #fff; text-decoration: none; text-align: center; padding: 11px; border-radius: 10px; font-weight: 700; font-size: 14px; }
    .demo { background: #fff8e1; color: #8a6d3b; font-size: 12px; text-align: center; padding: 8px; }
    .empty { text-align: center; color: var(--muted); padding: 40px; }
  </style>
</head>
<body>
  <header>
    <a href="index.html" aria-label="RealHands home"><img src="/logo-mark.svg" alt="RealHands" /></a>
    <div><h1>Browse Workers</h1><div class="sub">श्रमिक खोजें · Hyderabad</div></div>
    <a class="home" href="index.html">← Home</a>
  </header>

  <div class="demo" id="banner">Loading workers…</div>

  <div class="searchbar">
    <input id="search" placeholder="🔍 Search by name, trade or area…" oninput="render()" />
  </div>
  <div class="chips" id="chips"></div>

  <div class="wrap">
    <div class="count" id="count"></div>
    <div class="grid" id="grid"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="workers-data.js"></script>
  <script>
    const WA_NUMBER = '__WA_NUMBER__';
    const TRADES = ['All','Mason','Electrician','Plumber','Carpenter','Driver','Painter','Cleaner','Security','Gardener','Cook/Maid','Welder'];
    const EMOJI = { Mason:'🧱', Electrician:'⚡', Plumber:'🔧', Carpenter:'🔨', Driver:'🚛', Painter:'🎨', Cleaner:'🧹', Security:'💂', Gardener:'🌱', 'Cook/Maid':'🍳', Welder:'🔥' };
    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    let WORKERS = [], activeTrade = 'All';

    function stars(r){ const f = Math.round(r); return '★'.repeat(f) + '☆'.repeat(5 - f); }
    function tradeKeyFrom(s){ s = s || ''; return TRADES.find(t => t !== 'All' && s.includes(t)) || ''; }

    function normalizeSample(w){
      return { id:w.id, profile:true, emoji:EMOJI[w.trade]||'', name:w.name, tradeKey:w.trade,
        tradeLabel:(EMOJI[w.trade]||'')+' '+w.trade, exp:w.exp, area:w.area, wage:w.wage?w.wage+'/day':'',
        rating:w.rating, jobs:w.jobs, verified:!!w.verified, available:w.available, isNew:false };
    }
    function normalizeReal(r){
      const key = tradeKeyFrom(r.trade);
      return { id:r.id, profile:false, emoji:EMOJI[key]||Array.from(r.trade||'')[0]||'👷', name:r.name||'Worker',
        tradeKey:key, tradeLabel:r.trade||key||'Worker', exp:r.experience||'', area:r.area||'', wage:r.wage||'',
        rating:null, jobs:null, verified:false, available:true, isNew:true };
    }

    function chipsHtml(){
      document.getElementById('chips').innerHTML = TRADES.map(t =>
        `<div class="chip ${t===activeTrade?'active':''}" onclick="setTrade('${t}')">${t==='All'?'All':((EMOJI[t]||'')+' '+t)}</div>`
      ).join('');
    }
    function setTrade(t){ activeTrade = t; chipsHtml(); render(); }

    function render(){
      const q = document.getElementById('search').value.trim().toLowerCase();
      const list = WORKERS.filter(w => {
        const mt = activeTrade === 'All' || w.tradeKey === activeTrade || (w.tradeLabel||'').includes(activeTrade);
        const mq = !q || (w.name + ' ' + w.tradeLabel + ' ' + w.area).toLowerCase().includes(q);
        return mt && mq;
      });
      document.getElementById('count').textContent = `${list.length} worker${list.length!==1?'s':''} found`;
      if (!list.length){
        document.getElementById('grid').innerHTML = WORKERS.length
          ? '<div class="empty">No workers match your search.</div>'
          : '<div class="empty">No workers registered yet — <a href="register-worker.html" style="color:var(--green2);font-weight:700">be the first!</a></div>';
        return;
      }
      document.getElementById('grid').innerHTML = list.map(w => {
        const initials = (w.name||'?').split(' ').map(s=>s[0]).slice(0,2).join('');
        const waMsg = encodeURIComponent(`Hi, I want to hire ${w.name} (${w.tradeLabel}) from RealHands.`);
        const head = `
          <div class="avatar">${w.emoji||initials}</div>
          <div>
            <div class="wname">${esc(w.name)} ${w.verified?'<span class="verified" title="Verified">✔️</span>':''}</div>
            <div class="wtrade">${esc(w.tradeLabel)}${w.exp?' · '+esc(w.exp):''}</div>
            ${w.rating!=null ? `<div class="stars">${stars(w.rating)} <span>${w.rating} (${w.jobs} jobs)</span></div>`
                             : `<div class="stars" style="color:#0a7a3d">🆕 New worker</div>`}
          </div>`;
        const top = w.profile
          ? `<a class="wtop" href="worker.html?id=${w.id}" style="text-decoration:none;color:inherit;cursor:pointer;">${head}</a>`
          : `<div class="wtop">${head}</div>`;
        return `
          <div class="wcard">
            ${top}
            <div class="meta">
              <span class="tag">📍 ${esc(w.area||'—')}</span>
              ${w.wage?`<span class="tag wage">${esc(w.wage)}</span>`:''}
              ${w.isNew ? '<span class="tag" style="background:#e0f2fe;color:#0369a1">🆕 New</span>'
                        : (w.available?'<span class="tag avail">🟢 Available</span>':'<span class="tag">⚪ Busy</span>')}
            </div>
            <a class="contact" href="https://wa.me/${WA_NUMBER}?text=${waMsg}" target="_blank" rel="noopener">💬 Contact on WhatsApp</a>
          </div>`;
      }).join('');
    }

    async function loadWorkers(){
      let rows = null;
      try { rows = await fetchFromDatabase('workers_public', { order: 'created_at' }); } catch (e) {}
      const banner = document.getElementById('banner');
      if (rows === null){
        WORKERS = (window.RH_WORKERS || []).map(normalizeSample);
        banner.innerHTML = '⭐ Example profiles shown (live database not connected here).';
      } else {
        WORKERS = rows.map(normalizeReal);
        banner.innerHTML = '✅ Registered workers near you — contact them free on WhatsApp.';
      }
      render();
    }

    // init
    const params = new URLSearchParams(location.search);
    if (params.get('trade')) activeTrade = params.get('trade');
    if (params.get('q')) document.getElementById('search').value = params.get('q');
    chipsHtml();
    loadWorkers();
  </script>
</body>
</html>
