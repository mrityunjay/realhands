<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 140" width="560" height="140" role="img" aria-label="RealHands">
  <defs>
    <linearGradient id="lk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="0.5" stop-color="#10b981"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <!-- Mark -->
  <g transform="translate(6 6)">
    <rect x="8" y="8" width="112" height="112" rx="30" fill="url(#lk)"/>
    <ellipse cx="46" cy="34" rx="38" ry="22" fill="#ffffff" opacity="0.12"/>
    <g fill="#ffffff">
      <rect x="33" y="42" width="12.5" height="42" rx="6.25"/>
      <rect x="48" y="35" width="12.5" height="49" rx="6.25"/>
      <rect x="63" y="38" width="12.5" height="46" rx="6.25"/>
      <rect x="78" y="46" width="12.5" height="38" rx="6.25"/>
      <rect x="20" y="64" width="12.5" height="34" rx="6.25" transform="rotate(-40 26.25 81)"/>
      <rect x="31" y="72" width="62" height="34" rx="17"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="150" y="74" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="56" font-weight="800" letter-spacing="-1">
    <tspan fill="#0a3d35">Real</tspan><tspan fill="#10b981">Hands</tspan>
  </text>
  <text x="152" y="106" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="600" letter-spacing="3" fill="#5b6b67">REAL HANDS FOR REAL WORK</text>
</svg>
