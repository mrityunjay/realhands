<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="RealHands logo">
  <defs>
    <linearGradient id="rhg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="0.5" stop-color="#10b981"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="rhs" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.2" flood-color="#063f47" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Badge -->
  <rect x="8" y="8" width="112" height="112" rx="30" fill="url(#rhg)" filter="url(#rhs)"/>
  <ellipse cx="46" cy="34" rx="38" ry="22" fill="#ffffff" opacity="0.12"/>

  <!-- Open hand (white) -->
  <g fill="#ffffff">
    <!-- fingers -->
    <rect x="33"  y="42" width="12.5" height="42" rx="6.25"/>
    <rect x="48"  y="35" width="12.5" height="49" rx="6.25"/>
    <rect x="63"  y="38" width="12.5" height="46" rx="6.25"/>
    <rect x="78"  y="46" width="12.5" height="38" rx="6.25"/>
    <!-- thumb -->
    <rect x="20" y="64" width="12.5" height="34" rx="6.25" transform="rotate(-40 26.25 81)"/>
    <!-- palm -->
    <rect x="31" y="72" width="62" height="34" rx="17"/>
  </g>
</svg>
